# Prefix: Ctrl+a (mais ergonômico que Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Suporte a cores 24-bit
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"

# Indexar janelas e painéis a partir de 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Mouse
set -g mouse on

# Sem delay no Escape (importante para Neovim)
set -sg escape-time 0

# Aumenta histórico do scrollback
set -g history-limit 10000

# Splits com teclas intuitivas (mantém o diretório atual)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Navegar entre painéis com Alt+seta (sem prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Recarregar config
bind r source-file ~/.tmux.conf \; display "Config recarregado"

# Status bar
set -g status-position bottom
set -g status-style bg='#1e1e2e',fg='#cdd6f4'
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"
set -g status-left-length 30
set -g status-right "#[fg=#585b70]%d/%m  #[fg=#cdd6f4]%H:%M "
set -g status-right-length 30

# Janela ativa / inativa
set -g window-status-current-style bg='#313244',fg='#89b4fa',bold
set -g window-status-current-format " #I #W "
set -g window-status-format " #I #W "
set -g window-status-style fg='#585b70'

# Borda dos painéis
set -g pane-border-style fg='#313244'
set -g pane-active-border-style fg='#89b4fa'
