# Print com notificação e cópia para clipboard
bindsym {
    # Tela inteira
    Print exec grimshot --notify save output
    # Janela ativa
    Alt+Print exec grimshot --notify save active
    # Selecionar área
    Ctrl+Print exec grimshot --notify save area
    # Copiar direto para clipboard (sem salvar arquivo)
    Shift+Print exec grimshot --notify copy area
}
